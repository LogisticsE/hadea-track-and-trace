<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI Embedded Report</title>
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.21.0/dist/powerbi.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        
        .report-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .report-wrapper {
            width: 100%;
            max-width: 1140px;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        #reportContainer {
            width: 100%;
            height: 80vh;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            background: white;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #d32f2f;
        }
        @media (max-width: 768px) {
            #reportContainer {
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="report-wrapper">
            <div class="report-header">
                <h3>Power BI Report</h3>
            </div>
            <div id="reportContainer">
                <div class="loading">Loading report...</div>
            </div>
        </div>
    </div>

    <script>
        async function embedReport() {
            try {
                console.log('Fetching embed info from backend...');
                
                const response = await fetch('/api/embed-info');
                const embedInfo = await response.json();

                if (embedInfo.error) {
                    throw new Error(embedInfo.error);
                }

                console.log('Embed info received:', embedInfo);

                if (typeof powerbi === 'undefined') {
                    throw new Error('Power BI library not loaded');
                }

                const models = window['powerbi-client'].models;

                const config = {
                    type: 'report',
                    tokenType: models.TokenType.Embed,
                    accessToken: embedInfo.embedToken,
                    embedUrl: embedInfo.embedUrl,
                    id: embedInfo.reportId,
                    permissions: models.Permissions.Read,
                    settings: {
                        panes: {
                            filters: {
                                expanded: false,
                                visible: false
                            }
                        },
                        background: models.BackgroundType.Transparent
                    }
                };

                const reportContainer = document.getElementById('reportContainer');
                const report = powerbi.embed(reportContainer, config);

                report.on('loaded', () => {
                    console.log('Report loaded successfully!');
                });

                report.on('error', (event) => {
                    console.error('Report error:', event.detail);
                    reportContainer.innerHTML = '<div class="error">Error loading report. Check console for details.</div>';
                });

            } catch (error) {
                console.error('Error embedding report:', error);
                document.getElementById('reportContainer').innerHTML = 
                    `<div class="error">Failed to load report: ${error.message}<br><br>Check browser console for details.</div>`;
            }
        }

        // Load report immediately when page loads
        document.addEventListener('DOMContentLoaded', embedReport);
    </script>
</body>
</html>
